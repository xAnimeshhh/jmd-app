<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JMD Enterprise - POS + Inventory</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary:#12142c;
      --primary2:#1d2158;
      --accent:#4f5bfb;
      --accent2:#8b5cf6;
      --success:#0ea968;
      --danger:#e0364c;
      --warning:#e08a1e;
      --bg:#eef0fa;
      --surface:#fff;
      --line:#e7e9f6;
      --dark:#10122a;
      --text:#5b6178;
      --muted:#9aa0ba;
      --soft:#f6f7fd;
    }
    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:'Manrope',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    body {
      background:
        radial-gradient(620px 320px at 18% -6%,rgba(79,91,251,.16),transparent 70%),
        radial-gradient(520px 300px at 100% 0%,rgba(139,92,246,.13),transparent 65%),
        var(--bg);
      color:var(--text);
      padding:12px;
      display:flex;
      justify-content:center;
      min-height:100vh;
    }
    .container {
      width:100%;
      max-width:460px;
      background:rgba(255,255,255,.98);
      padding:16px;
      border-radius:22px;
      box-shadow:0 20px 46px rgba(18,20,44,.10),0 2px 8px rgba(18,20,44,.06);
      border:1px solid rgba(230,232,246,.9);
      height:fit-content;
    }
    header {
      text-align:center;
      margin-bottom:14px;
    }
    .brand-mark {
      width:40px;
      height:40px;
      margin:0 auto 8px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:16px;
      box-shadow:0 8px 18px rgba(79,91,251,.35);
    }
    header h2 {
      font-size:19px;
      font-weight:800;
      letter-spacing:-.4px;
      background:linear-gradient(120deg,var(--dark),var(--primary2) 60%,var(--accent));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    header p {
      font-size:9px;
      color:var(--muted);
      margin-top:3px;
      text-transform:uppercase;
      letter-spacing:.9px;
      font-weight:700;
    }
    .main-nav {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:4px;
      margin-bottom:14px;
      background:var(--soft);
      padding:5px;
      border-radius:14px;
      border:1px solid var(--line);
    }
    .nav-btn {
      padding:10px 6px;
      font-size:11px;
      font-weight:700;
      border:0;
      border-radius:10px;
      cursor:pointer;
      background:transparent;
      color:#8a8fa8;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      transition:.18s;
    }
    .nav-btn i {
      font-size:11px;
    }
    .nav-btn.active {
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      box-shadow:0 6px 14px rgba(18,20,44,.22);
    }
    .view {
      display:none;
    }
    .view.active {
      display:block;
    }
    .section-label {
      display:block;
      font-size:10px;
      font-weight:800;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:6px;
      letter-spacing:.35px;
    }
    .category-tabs {
      display:flex;
      gap:6px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:5px;
      margin-bottom:10px;
      flex:1;
      min-width:0;
    }
    .cat-tabs-row {
      display:flex;
      align-items:center;
      gap:8px;
    }
    .add-product-fab {
      flex-shrink:0;
      width:34px;
      height:34px;
      margin-bottom:10px;
      border-radius:10px;
      border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      font-size:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 12px rgba(79,91,251,.4);
      transition:.15s;
    }
    .add-product-fab:active {
      transform:scale(.92);
    }
    .modal-overlay {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.55);
      backdrop-filter:blur(2px);
      z-index:999;
      align-items:flex-end;
      justify-content:center;
      animation:fadeIn .15s ease;
    }
    .modal-overlay.open {
      display:flex;
    }
    @keyframes fadeIn {
      from {
        opacity:0;
      }
      to {
        opacity:1;
      }
    }
    .modal-sheet {
      width:100%;
      max-width:460px;
      background:#fff;
      border-radius:20px 20px 0 0;
      padding:18px 16px 22px;
      box-shadow:0 -10px 30px rgba(15,23,42,.25);
      animation:slideUp .2s ease;
      max-height:88vh;
      overflow-y:auto;
    }
    @keyframes slideUp {
      from {
        transform:translateY(30px);
        opacity:0;
      }
      to {
        transform:translateY(0);
        opacity:1;
      }
    }
    .modal-handle {
      width:36px;
      height:4px;
      background:var(--line);
      border-radius:4px;
      margin:0 auto 14px;
    }
    .modal-title {
      font-size:15px;
      font-weight:800;
      color:var(--dark);
      margin-bottom:2px;
    }
    .modal-sub {
      font-size:10.5px;
      color:var(--muted);
      margin-bottom:16px;
    }
    .modal-field {
      margin-bottom:12px;
    }
    .modal-field label {
      display:block;
      font-size:10px;
      font-weight:700;
      color:var(--text);
      text-transform:uppercase;
      letter-spacing:.3px;
      margin-bottom:6px;
    }
    .modal-field input,.modal-field select {
      width:100%;
      padding:11px 12px;
      border-radius:10px;
      border:1.5px solid var(--line);
      font-size:13px;
      font-weight:600;
      color:var(--dark);
      background:var(--soft);
    }
    .modal-field input:focus,.modal-field select:focus {
      outline:none;
      border-color:var(--accent);
      background:#fff;
    }
    .modal-row-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .modal-margin-preview {
      background:#eff6ff;
      border:1px solid #bfdbfe;
      border-radius:10px;
      padding:10px 12px;
      font-size:11.5px;
      font-weight:700;
      color:var(--accent);
      margin-bottom:14px;
      text-align:center;
    }
    .modal-btn-row {
      display:flex;
      gap:10px;
    }
    .modal-btn-row button {
      flex:1;
      padding:12px;
      border-radius:12px;
      border:none;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }
    .modal-btn-cancel {
      background:var(--soft);
      color:var(--text);
      border:1.5px solid var(--line) !important;
    }
    .modal-btn-save {
      background:linear-gradient(135deg,var(--success),#15803d);
      color:#fff;
      box-shadow:0 4px 10px rgba(22,163,74,.3);
    }
    .category-tabs::-webkit-scrollbar {
      height:3px;
    }
    .category-tabs::-webkit-scrollbar-thumb {
      background:#d7dee8;
      border-radius:4px;
    }
    .tab-btn {
      padding:8px 13px;
      font-size:10.5px;
      font-weight:700;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      cursor:pointer;
      white-space:nowrap;
      transition:.15s;
    }
    .tab-btn.active {
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      border-color:transparent;
      box-shadow:0 4px 10px rgba(18,20,44,.22);
    }
    .catalog-container {
      background:#f8fafc;
      padding:8px;
      border-radius:12px;
      margin-bottom:10px;
      border:1px solid var(--line);
    }
    .item-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:6px;
      max-height:210px;
      overflow-y:auto;
      padding-right:2px;
    }
    .product-card {
      background:#fff;
      padding:9px;
      border-radius:12px;
      border:1px solid var(--line);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:.15s;
      position:relative;
      min-height:64px;
      box-shadow:0 1px 2px rgba(18,20,44,.04);
    }
    .product-card:active {
      transform:scale(.97);
    }
    .product-card.active {
      border:1.5px solid var(--accent)!important;
      background:linear-gradient(135deg,#eef0ff,#f5f1ff);
      box-shadow:0 4px 12px rgba(79,91,251,.18);
    }
    .product-card h4 {
      font-size:11px;
      font-weight:750;
      color:var(--dark);
      margin-bottom:4px;
      line-height:1.25;
      padding-right:32px;
    }
    .stock-badge {
      position:absolute;
      top:6px;
      right:6px;
      font-size:8px;
      font-weight:800;
      padding:2px 5px;
      border-radius:4px;
    }
    .stock-ok {
      background:#dcfce7;
      color:#15803d;
    }
    .stock-low {
      background:#fef3c7;
      color:#b45309;
    }
    .stock-out {
      background:#fee2e2;
      color:#dc2626;
    }
    .price-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      width:100%;
      gap:4px;
    }
    .selling-price {
      color:var(--success);
      font-weight:750;
      font-size:10px;
    }
    .cp-price {
      font-weight:700;
      font-size:10px;
      color:var(--text);
    }
    .calc-box {
      background:#f8fafc;
      border:1px solid var(--line);
      padding:12px;
      border-radius:12px;
      margin-bottom:10px;
      display:none;
    }
    .grid-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:8px;
    }
    .grid-inputs input,.form-input {
      width:100%;
      padding:9px 10px;
      font-size:12px;
      border:1px solid var(--line);
      border-radius:8px;
      font-weight:700;
      color:var(--dark);
      outline:0;
      background:#fff;
    }
    .grid-inputs label,.form-label {
      display:block;
      font-size:10px;
      font-weight:750;
      color:var(--text);
      margin-bottom:4px;
    }
    .rate-btn-group {
      display:flex;
      gap:6px;
      margin-top:4px;
      flex-wrap:wrap;
    }
    .rate-btn {
      flex:1;
      min-width:60px;
      padding:8px;
      font-size:10px;
      font-weight:750;
      background:#fff;
      border:1px solid var(--line);
      border-radius:8px;
      cursor:pointer;
      color:var(--text);
    }
    .rate-btn.active {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      border-color:transparent;
      box-shadow:0 4px 10px rgba(79,91,251,.28);
    }
    .round-info {
      font-size:11px;
      color:var(--accent);
      font-weight:750;
      margin-top:8px;
      background:#eff6ff;
      padding:8px;
      border-radius:8px;
      text-align:center;
    }
    .tarp-size-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
      margin-bottom:8px;
    }
    .tarp-size-btn {
      padding:8px 4px;
      font-size:10px;
      font-weight:750;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      cursor:pointer;
    }
    .tarp-size-btn.active {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      border-color:transparent;
      box-shadow:0 4px 10px rgba(79,91,251,.28);
    }
    .qty-container {
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#f1f5f9;
      padding:8px 12px;
      border-radius:12px;
      margin-bottom:10px;
      border:1px solid var(--line);
    }
    .qty-label {
      font-size:12px;
      font-weight:750;
      color:var(--dark);
      display:flex;
      align-items:center;
      gap:6px;
    }
    .qty-controls {
      display:flex;
      align-items:center;
      gap:10px;
    }
    .qty-btn {
      width:30px;
      height:30px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#fff;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--dark);
    }
    .qty-val {
      font-size:13px;
      font-weight:850;
      color:var(--dark);
      min-width:18px;
      text-align:center;
    }
    .status-ribbon {
      padding:9px 12px;
      border-radius:11px;
      font-size:11px;
      font-weight:750;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }
    .status-success {
      background:#f0fdf4;
      border:1px solid #bbf7d0;
      color:var(--success);
    }
    .status-danger {
      background:#fef2f2;
      border:1px solid #fecaca;
      color:var(--danger);
    }
    .type-selector {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:10px;
    }
    .type-btn {
      padding:10px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      cursor:pointer;
      font-weight:750;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:11px;
    }
    .type-btn.active {
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      box-shadow:0 4px 10px rgba(18,20,44,.25);
    }
    .input-wrapper {
      position:relative;
      margin-top:2px;
      margin-bottom:10px;
    }
    .amount-input {
      width:100%;
      padding:11px 10px 11px 31px;
      font-size:16px;
      font-weight:850;
      border:1px solid #cbd5e1;
      border-radius:10px;
      background:#fff;
      color:var(--dark);
      outline:0;
    }
    .amount-input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(79,91,251,.12);
    }
    .input-icon {
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      color:var(--dark);
      font-weight:800;
      font-size:13px;
    }
    .action-btn {
      width:100%;
      padding:13px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      border:0;
      border-radius:12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(79,91,251,.28);
      transition:.15s;
    }
    .action-btn:active {
      transform:scale(.98);
    }
    .action-btn.green {
      background:linear-gradient(135deg,var(--success),#0c8a56);
      box-shadow:0 6px 16px rgba(14,169,104,.3);
    }
    .sticky-cta {
      position:sticky;
      bottom:8px;
      z-index:20;
      background:rgba(255,255,255,.95);
      padding-top:6px;
      backdrop-filter:blur(6px);
    }
    .logs-section {
      border-top:1px dashed var(--line);
      padding-top:10px;
      margin-top:10px;
    }
    .logs-container {
      margin-top:6px;
      max-height:340px;
      overflow-y:auto;
      border:1px solid var(--line);
      border-radius:11px;
      background:#f8fafc;
    }
    .log-item {
      display:flex;
      justify-content:space-between;
      padding:8px 10px;
      border-bottom:1px solid var(--line);
      font-size:10.5px;
      align-items:center;
      gap:5px;
    }
    .log-item:last-child {
      border-bottom:0;
    }
    .log-details {
      flex-grow:1;
      min-width:0;
    }
    .log-profit {
      font-size:9.5px;
      font-weight:800;
      margin-top:1px;
      display:inline-block;
    }
    .profit-positive {
      color:var(--success);
    }
    .profit-negative {
      color:var(--danger);
    }
    .delete-log-btn {
      background:transparent;
      border:0;
      color:#94a3b8;
      padding:5px 7px;
      cursor:pointer;
      font-size:11px;
      border-radius:5px;
    }
    .delete-log-btn:hover {
      color:var(--danger);
      background:#fee2e2;
    }
    .dashboard {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
      margin:10px 0;
      background:#f1f5f9;
      border:1px solid var(--line);
      padding:8px;
      border-radius:13px;
    }
    .card {
      padding:9px 10px;
      border-radius:9px;
      background:#fff;
      border:1px solid var(--line);
    }
    .card-title {
      font-size:9px;
      font-weight:850;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:.35px;
    }
    .card-value {
      font-size:13px;
      font-weight:850;
      margin-top:2px;
      color:var(--dark);
    }
    .card.total {
      grid-column:span 2;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      border:0;
    }
    .card.total .card-title {
      color:#94a3b8;
    }
    .card.total .card-value {
      color:#fff;
      font-size:15px;
    }
    .card.profit {
      grid-column:span 2;
      border:1px solid #bbf7d0;
      background:#f0fdf4;
    }
    .card.profit.margin-red {
      border-color:#fecaca;
      background:#fef2f2;
    }
    .card.profit .card-title,.card.profit .card-value {
      color:var(--success);
    }
    .card.profit.margin-red .card-title,.card.profit.margin-red .card-value {
      color:var(--danger);
    }
    .share-btn {
      width:100%;
      padding:12px;
      background:linear-gradient(135deg,#10b981,#0c8a56);
      box-shadow:0 6px 16px rgba(16,185,129,.3);
      color:white;
      border:0;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:11px;
    }
    .stockin-mode-toggle {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      margin-bottom:12px;
    }
    .stockin-mode-btn {
      padding:10px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:10px;
      font-size:11px;
      font-weight:800;
      cursor:pointer;
      text-align:center;
      color:var(--text);
    }
    .stockin-mode-btn.active {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      border-color:transparent;
      box-shadow:0 4px 10px rgba(79,91,251,.28);
    }
    .stockin-form {
      background:#f8fafc;
      border:1px solid var(--line);
      padding:12px;
      border-radius:12px;
      margin-bottom:10px;
    }
    .form-row {
      margin-bottom:10px;
    }
    .bulk-textarea {
      width:100%;
      min-height:110px;
      padding:10px;
      font-size:11px;
      border:1px solid var(--line);
      border-radius:9px;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      resize:vertical;
      outline:0;
    }
    .bulk-help {
      font-size:10px;
      color:var(--muted);
      margin-top:4px;
      line-height:1.5;
    }
    .invest-box {
      background:#eff6ff;
      border:1px solid #bfdbfe;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    }
    .invest-box label {
      font-size:10px;
      font-weight:850;
      color:var(--accent);
      margin-bottom:4px;
      display:block;
    }
    .invest-box input {
      width:100%;
      padding:10px;
      font-size:14px;
      font-weight:850;
      border:1px solid #bfdbfe;
      border-radius:8px;
      outline:0;
    }
    .ledger-cards {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
      margin-bottom:12px;
    }
    .ledger-card {
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:0 2px 6px rgba(18,20,44,.05);
    }
    .lc-title {
      font-size:9px;
      font-weight:850;
      text-transform:uppercase;
      color:var(--muted);
    }
    .lc-value {
      font-size:16px;
      font-weight:900;
      margin-top:4px;
