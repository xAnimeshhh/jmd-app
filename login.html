<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMD Traders - Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --wine-dark: #1a0008;
            --wine-mid: #4a0e2a;
            --wine-bright: #800040;
            --gold-primary: #ffcc33;
            --gold-secondary: #cc9900;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, var(--wine-bright) 0%, var(--wine-dark) 100%);
            height: 100dvh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Poppins', sans-serif; overflow: hidden;
        }

        #toastr {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            min-width: 280px; padding: 14px 22px; border-radius: 12px;
            color: #fff; font-size: 14px; font-weight: 600; display: none; z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .toast-success { background: rgba(0, 150, 136, 0.9); border-bottom: 3px solid #00ffa2; }
        .toast-error { background: rgba(183, 28, 28, 0.9); border-bottom: 3px solid #ff5252; }

        .login-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 40px;
            width: 85%; max-width: 330px; padding: 45px 25px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .logo-container {
            width: 95px; height: 95px; margin: 0 auto 20px;
            border: 2px solid var(--gold-primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #25000c; box-shadow: 0 0 25px rgba(255, 204, 51, 0.2);
        }
        .logo-container img { width: 85%; height: 85%; object-fit: contain; }

        h2 { color: var(--gold-primary); font-size: 22px; margin: 0; letter-spacing: 1.5px; }
        .sub-text { font-size: 10px; color: rgba(255, 204, 51, 0.6); letter-spacing: 2.5px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 15px; }
        
        input {
            width: 100%; padding: 15px 20px; border-radius: 14px; border: none;
            background: #fff; font-weight: 700; color: #333; font-size: 15px;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }

        #username { text-transform: uppercase; } /* Force UI to show caps */

        .toggle-pass {
            position: absolute; right: 18px; top: 18px; color: #888; cursor: pointer;
        }

        /* Improved Premium Button */
        .unlock-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            background-size: 200% auto;
            border: none; border-radius: 14px;
            font-weight: 900; color: #1a0008; text-transform: uppercase;
            cursor: pointer; transition: 0.5s; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .unlock-btn:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 204, 51, 0.3);
        }

        .unlock-btn:active { transform: translateY(0); }

    </style>
</head>
<body>

<div id="toastr"></div>

<div class="login-card">
    <div class="logo-container">
        <img src="assets/logo.webp" alt="JMD">
    </div>
    <h2>JMD TRADERS</h2>
    <div class="sub-text">SECURE ACCESS SYSTEM</div>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="USERNAME" 
               oninput="this.value = this.value.toUpperCase()">
    </div>
    
    <div class="input-group">
        <input type="tel" id="password" placeholder="4-DIGIT PIN" 
               maxlength="4" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <i class="fa-solid fa-eye toggle-pass" id="eyeIcon" onclick="togglePassword()"></i>
    </div>
    
    <button class="unlock-btn" onclick="checkAuth()">
        UNLOCK SYSTEM <i class="fa-solid fa-lock-open"></i>
    </button>
</div>

<script>
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toastr');
        const icon = type === 'success' ? '<i class="fa-solid fa-shield-check"></i>' : '<i class="fa-solid fa-circle-exclamation"></i>';
        toast.className = 'toast-' + type;
        toast.innerHTML = `${icon} &nbsp; ${message}`;
        toast.style.display = 'block';
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => { toast.style.display = 'none'; }, 300);
        }, 3000);
    }

    function togglePassword() {
        const p = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (p.type === "password" || p.type === "tel") {
            p.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            p.type = "tel";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function checkAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if(u === "JMD" && p === "1707") {
            localStorage.setItem('jmd_isLoggedIn', 'true');
            sessionStorage.setItem('jmd_sessionActive', 'true');
            showToast("Authenticated! Redirecting...", "success");
            setTimeout(() => {
                window.location.href = "invoice.html"; // Yahan apna agla page ka link daal
            }, 1500);
        } else {
            showToast("Invalid Access Details", "error");
        }
    }
</script>
</body>
</html>
