<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>JMD Requirements</title>
<style>
:root {
    --bg-main: #030712;
    --card-bg: rgba(17, 24, 39, 0.7);
    --border-color: rgba(255, 255, 255, 0.08);
    --accent-green: #10b981;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --text-primary: #f9fafb;
    --text-muted: #9ca3af;
    --glass-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at top right, #0b1528, var(--bg-main));
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.wrap { max-width: 1400px; margin: auto; padding: 24px; flex: 1; width: 100%; box-sizing: border-box; }

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 16px;
    margin-bottom: 24px;
}

h1 {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #34d399 0%, #3b82f6 50%, #a855f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
}

.sync-status {
    background: rgba(31, 41, 55, 0.5);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-color);
    padding: 6px 12px;
    border-radius: 40px;
    font-size: 0.75rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
}

.dot { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; display: inline-block; }
.dot.ready { background: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); }
.dot.loading { background: #f59e0b; box-shadow: 0 0 12px #f59e0b; }

.mobile-tabs {
    display: none;
    background: rgba(17, 24, 39, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 16px;
    gap: 4px;
}

.tab-btn {
    flex: 1;
    background: transparent;
    color: var(--text-muted);
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}
.tab-btn.active {
    background: var(--accent-blue);
    color: #fff;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.main-layout { display: grid; grid-template-columns: 1fr 1.3fr; gap: 24px; }
.card {
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 20px;
    box-shadow: var(--glass-glow);
    height: fit-content;
}
.card-title { margin: 0 0 14px 0; font-size: 1.1rem; font-weight: 700; color: #fff; }

textarea {
    width: 100%;
    min-height: 400px;
    background: rgba(0, 0, 0, 0.3);
    color: #f3f4f6;
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 14px;
    box-sizing: border-box;
    font-size: 0.95rem;
    resize: none;
    font-family: inherit;
}

.search-box {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    color: #fff;
    margin-bottom: 14px;
    box-sizing: border-box;
    font-size: 0.9rem;
}

.actions { display: flex; gap: 10px; margin-top: 14px; }
button.action-btn {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s ease;
}
.primary { background: linear-gradient(135deg, #10b981, #059669); color: #022c22; flex: 2; box-shadow: 0 4px 16px rgba(16, 185, 129, 0.2); }
.ghost { background: rgba(55, 65, 81, 0.5); color: #fff; border: 1px solid var(--border-color); flex: 1; }
button:disabled { opacity: 0.3; cursor: not-allowed; }

.stats-bar {
    font-size: 0.8rem;
    font-weight: 600;
    color: #cbd5e1;
    background: rgba(255, 255, 255, 0.03);
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 14px;
    border: 1px solid var(--border-color);
}

.grid { display: grid; grid-template-columns: 1fr; gap: 14px; max-height: 650px; overflow-y: auto; }
.grid::-webkit-scrollbar { width: 5px; }
.grid::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

.group {
    background: rgba(0, 0, 0, 0.25);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid var(--border-color);
    border-left: 5px solid var(--accent-blue);
}
.group.supplier-panjarapole { border-left-color: #a855f7; }
.group.supplier-masjid-reliable { border-left-color: #ec4899; }
.group.supplier-masjid-corner { border-left-color: #3b82f6; }
.group.supplier-masjid-kapus-wala { border-left-color: #10b981; }
.group.supplier-masjid-masala { border-left-color: #f59e0b; }
.group.supplier-brass-copper { border-left-color: #eab308; }
.group.supplier-unknown-others { border-left-color: #ef4444; }
.group.all-done { opacity: 0.35; }

.group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.group h3 { margin: 0; font-size: 0.9rem; font-weight: 800; color: #fff; }
.group span.count { font-size: 0.7rem; background: rgba(255,255,255,0.06); padding: 2px 10px; border-radius: 30px; margin-left: 6px; }

.mini-copy-btn {
    background: rgba(255, 255, 255, 0.05);
    color: var(--accent-blue);
    border: 1px solid var(--border-color);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
}

.checklist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
}

.cb-custom {
    width: 16px;
    height: 16px;
    border: 1.5px solid #4b5563;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.cb-custom::after { content: '✓'; font-size: 10px; color: #fff; font-weight: 900; display: none; }

.item-text { color: #f3f4f6; font-size: 0.9rem; font-weight: 600; flex-grow: 1; outline: none; }

.checklist-item.checked { background: rgba(16, 185, 129, 0.02); }
.checklist-item.checked .cb-custom { background: var(--accent-green); border-color: var(--accent-green); }
.checklist-item.checked .cb-custom::after { display: block; }
.checklist-item.checked .item-text { text-decoration: line-through; color: var(--text-muted); opacity: 0.4; }

.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(16, 185, 129, 0.95);
    color: #022c22;
    padding: 10px 24px;
    border-radius: 30px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 9999;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* --- 🌟 BRAND NEW FOOTER STYLE --- */
.site-footer {
    text-align: center;
    padding: 20px 24px;
    margin-top: 40px;
    border-top: 1px solid var(--border-color);
    background: rgba(17, 24, 39, 0.4);
    backdrop-filter: blur(8px);
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.3px;
}
.site-footer .dev-credit {
    margin-top: 4px;
    font-size: 0.85rem;
    color: #cbd5e1;
}
.site-footer .dev-name {
    font-weight: 700;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.site-footer .heart {
    color: #ef4444;
    display: inline-block;
    animation: heartbeat 1.5s infinite;
}
@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

@media(max-width: 900px) {
    .mobile-tabs { display: flex; }
    .main-layout { grid-template-columns: 1fr; }
    .layout-panel { display: none; }
    .layout-panel.active { display: block; }
}
</style>
</head>
<body>

<div class="wrap">
    <div class="header">
        <h1>JMD Requirements Segregator</h1>
        <div class="sync-status">
            <span id="syncDot" class="dot"></span>
            <span id="syncText">Syncing Matrix...</span>
        </div>
    </div>

    <div class="mobile-tabs">
        <button id="tabInput" class="tab-btn active" onclick="switchMobileTab('input')">1. Paste Order</button>
        <button id="tabResult" class="tab-btn" onclick="switchMobileTab('result')">2. Live Checklist</button>
    </div>

    <div class="main-layout">
        <div id="panelInput" class="card layout-panel active">
            <div class="card-title">Paste Order Details</div>
            <textarea id="input" placeholder="Paste your order here..."></textarea>
            <div class="actions">
                <button id="btnOrganize" class="action-btn primary" onclick="handleOrganizeClick()" disabled>Organize & Sort</button>
                <button class="action-btn ghost" onclick="copyText()">Copy All</button>
            </div>
        </div>

        <div id="panelResult" class="card layout-panel">
            <div class="card-title">Segregated Checklist</div>
            <input type="text" id="searchBar" class="search-box" onkeyup="filterResults()" placeholder="🔍 Quick search items...">
            <div id="stats" class="stats-bar">Loading Sheets Database...</div>
            <div id="cards" class="grid"></div>
        </div>
    </div>
</div>

<!-- 🌟 FOOTER SECTION -->
<footer class="site-footer">
    <div>&copy; 2026 JMD Traders. All Rights Reserved.</div>
    <div class="dev-credit">Developed with <span class="heart">❤️</span> by <span class="dev-name">Animesh Verma</span></div>
</footer>

<div id="toastMessage" class="toast">Copied!</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-9msNLMkWOxi896ur53Z6QXM_JKz043G5ugEzCTgXDQmM67Pd3r0xiayZXx67odC-Ag/exec";
let databaseRules = [];

window.addEventListener('DOMContentLoaded', fetchScriptData);

async function fetchScriptData() {
    const dot = document.getElementById("syncDot");
    const text = document.getElementById("syncText");
    dot.className = "dot loading";
    try {
        const response = await fetch(APPS_SCRIPT_URL);
        databaseRules = await response.json();
        
        databaseRules = databaseRules.map(rule => ({
            itemName: (rule.itemName || "").trim().toLowerCase(),
            preferredName: (rule.preferredName || "").trim().toLowerCase(),
            supplier: (rule.supplier || "Unknown / Others").trim(),
            aliases: Array.isArray(rule.aliases) ? rule.aliases.map(a => a.trim().toLowerCase()) : []
        }));

        dot.className = "dot ready";
        text.textContent = "Active Matrix";
        document.getElementById("btnOrganize").disabled = false;
        document.getElementById("stats").textContent = `Ready! Items Loaded: ${databaseRules.length}`;
    } catch (error) {
        text.textContent = "Offline Mode";
        dot.className = "dot";
    }
}

function showToast(msg) {
    const toast = document.getElementById("toastMessage");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 2000);
}

function switchMobileTab(target) {
    document.getElementById('tabInput').classList.toggle('active', target === 'input');
    document.getElementById('tabResult').classList.toggle('active', target === 'result');
    document.getElementById('panelInput').classList.toggle('active', target === 'input');
    document.getElementById('panelResult').classList.toggle('active', target === 'result');
}

function handleOrganizeClick() {
    organize();
    if(window.innerWidth <= 900) { switchMobileTab('result'); }
}

function toTitleCase(str) {
    return str.replace(/\w\S*/g, function(txt) {
        return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
    });
}

function getSimilarityScore(s1, s2) {
    let longer = s1; let shorter = s2;
    if (s1.length < s2.length) { longer = s2; shorter = s1; }
    let longerLength = longer.length;
    if (longerLength === 0) { return 1.0; }
    return (longerLength - editDistance(longer, shorter)) / parseFloat(longerLength);
}

function editDistance(s1, s2) {
    s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
    let costs = new Array();
    for (let i = 0; i <= s1.length; i++) {
        let lastValue = i;
        for (let j = 0; j <= s2.length; j++) {
            if (i == 0) costs[j] = j;
            else {
                if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) != s2.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
        }
        if (i > 0) costs[s2.length] = lastValue;
    }
    return costs[s2.length];
}

function findSupplierForLine(rawLine) {
    let text = rawLine.toLowerCase().trim();
    
    for(const rule of databaseRules) {
        if(text === rule.itemName || text === rule.preferredName || rule.aliases.includes(text)) {
            return rule.supplier;
        }
    }

    for(const rule of databaseRules) {
        if (text.includes(rule.itemName) || text.includes(rule.preferredName)) {
            return rule.supplier;
        }
        for(let alias of rule.aliases) {
            if (text.includes(alias)) {
                return rule.supplier;
            }
        }
    }

    let bestSupplier = "Unknown / Others";
    let highestScore = 0;
    for (const rule of databaseRules) {
        let scores = [
            getSimilarityScore(text, rule.itemName),
            getSimilarityScore(text, rule.preferredName)
        ];
        rule.aliases.forEach(alias => scores.push(getSimilarityScore(text, alias)));
        
        let maxRuleScore = Math.max(...scores);
        if (maxRuleScore > highestScore) {
            highestScore = maxRuleScore;
            bestSupplier = rule.supplier;
        }
    }

    if (highestScore >= 0.60) {
        return bestSupplier;
    }
    return "Unknown / Others";
}

function organize(){
    const inputVal = document.getElementById("input").value;
    const lines = inputVal.split(/\n+/).map(x => x.trim()).filter(Boolean);
    const groups = {};
    let unknownCount = 0;
    let totalProcessed = 0;

    for(let rawLine of lines){
        let supplier = findSupplierForLine(rawLine);
        
        if(supplier === "Unknown / Others") unknownCount++;
        
        if(!groups[supplier]) groups[supplier] = [];
        
        let formattedLine = toTitleCase(rawLine);
        
        if(!groups[supplier].some(item => item.name === formattedLine)) {
            groups[supplier].push({ name: formattedLine });
        }
        totalProcessed++;
    }
    renderChecklist(groups, totalProcessed, unknownCount);
}

function renderChecklist(groups, totalSize, unknownCount) {
    const cardsContainer = document.getElementById("cards");
    cardsContainer.innerHTML = "";
    document.getElementById("stats").textContent = `Processed: ${totalSize} • Unknowns: ${unknownCount}`;

    Object.keys(groups).sort().forEach(supplierGroup => {
        const uniqueItems = groups[supplierGroup];
        const div = document.createElement("div");
        const styleClass = supplierGroup.toLowerCase().replace(/[^a-z0-9]/g, '-');
        div.className = `group supplier-${styleClass}`;
        div.id = `group-${styleClass}`;
        
        let html = `
            <div class="group-header">
                <h3><span>${supplierGroup.toUpperCase()}</span> <span class="count" id="count-${styleClass}">0/${uniqueItems.length}</span></h3>
                <button class="mini-copy-btn" onclick="copySingleGroup(this)">Copy</button>
            </div>
            <div class="items-list">`;
        
        uniqueItems.forEach(item => {
            html += `
                <div class="checklist-item" onclick="toggleItem(this, '${styleClass}')">
                    <div class="cb-custom"></div>
                    <div class="item-text" contenteditable="true" onclick="event.stopPropagation();">${item.name}</div>
                </div>`;
        });
        
        html += "</div>";
        div.innerHTML = html;
        cardsContainer.appendChild(div);
        updateProgressBadge(styleClass);
    });
}

function toggleItem(itemElement, styleClass) {
    itemElement.classList.toggle('checked');
    updateProgressBadge(styleClass);
}

function updateProgressBadge(styleClass) {
    const groupDiv = document.getElementById(`group-${styleClass}`);
    const badge = document.getElementById(`count-${styleClass}`);
    const totalItems = groupDiv.querySelectorAll('.checklist-item').length;
    const checkedItems = groupDiv.querySelectorAll('.checklist-item.checked').length;
    badge.textContent = `${checkedItems}/${totalItems}`;
    
    if(totalItems === checkedItems && totalItems > 0) {
        groupDiv.classList.add('all-done');
        badge.style.background = "var(--accent-green)";
        badge.style.color = "#022c22";
    } else {
        groupDiv.classList.remove('all-done');
        badge.style.background = "rgba(255,255,255,0.06)";
        badge.style.color = "#fff";
    }
}

function filterResults() {
    let filter = document.getElementById('searchBar').value.toLowerCase();
    document.querySelectorAll('.group').forEach(card => {
        let anyVisible = false;
        card.querySelectorAll('.checklist-item').forEach(item => {
            let text = item.querySelector('.item-text').textContent.toLowerCase();
            if (text.includes(filter)) {
                item.style.display = "";
                anyVisible = true;
            } else {
                item.style.display = "none";
            }
        });
        card.style.display = anyVisible ? "" : "none";
    });
}

function copySingleGroup(btnElement) {
    let groupDiv = btnElement.closest('.group');
    let title = groupDiv.querySelector('h3 span').textContent;
    let out = `*${title}*\n`;
    groupDiv.querySelectorAll('.checklist-item').forEach(item => {
        if(item.style.display !== "none") {
            let statusIcon = item.classList.contains('checked') ? "✓ " : "• ";
            out += `  ${statusIcon}${item.querySelector('.item-text').textContent}\n`;
        }
    });
    navigator.clipboard.writeText(out.trim());
    showToast(`${title} copied!`);
}

function copyText(){
    let out = "";
    document.querySelectorAll(".group").forEach(g => {
        if(g.style.display !== "none") {
            out += `*${g.querySelector("h3 span").textContent}*\n`;
            g.querySelectorAll('.checklist-item').forEach(item => {
                if(item.style.display !== "none") {
                    let statusIcon = item.classList.contains('checked') ? "✓ " : "• ";
                    out += `  ${statusIcon}${item.querySelector('.item-text').textContent}\n`;
                }
            });
            out += "\n";
        }
    });
    navigator.clipboard.writeText(out.trim());
    showToast("Full list copied!");
}
</script>
</body>
</html>
